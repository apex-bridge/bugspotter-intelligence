name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bugspotter_intelligence
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run unit tests
      run: |
        pytest tests/ -v -m "not integration" --cov=src/bugspotter_intelligence

    - name: Run integration tests (with Docker)
      run: |
        pytest tests/ -v -m "integration"

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t bugspotter-intelligence:ci .

    - name: Verify health endpoint
      run: |
        docker run -d --name intel-test -p 8000:8000 \
          -e DATABASE_HOST=localhost \
          -e DATABASE_PORT=5432 \
          -e DATABASE_NAME=test \
          -e DATABASE_USER=postgres \
          -e DATABASE_PASSWORD=postgres \
          -e AUTH_ENABLED=false \
          -e REDIS_HOST=localhost \
          -e LLM_PROVIDER=ollama \
          -e OLLAMA_BASE_URL=http://localhost:11434 \
          bugspotter-intelligence:ci || true
        sleep 5
        docker logs intel-test 2>&1 | head -30
        docker rm -f intel-test