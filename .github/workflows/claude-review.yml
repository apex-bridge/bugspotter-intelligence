name: Claude PR Review

# Auto-reviews every PR using the Claude GitHub App, plus responds to
# `@claude` mentions in PR comments. Independent of `tests.yml` /
# `deploy.yml`; failures here don't gate merges.

on:
  # Auto-review the PR ONCE on open / ready-for-review / reopen.
  # `synchronize` (per-push) is intentionally excluded ‚Äî reviewing on
  # every commit dominates the action's spend, and a review on a stale
  # revision isn't useful. If a PR moves significantly during review,
  # re-run via `@claude review PR` (handled below) ‚Äî that path is
  # rate-limited by being human-driven.
  #
  # `paths-ignore` skips reviews on changes that don't benefit from one:
  # docs and workflow YAML (the action's own guardrail rejects modified
  # workflows from PR branches anyway).
  pull_request:
    types: [opened, ready_for_review, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  # @claude mentions in PR comments and review threads. The `if:` guard
  # below keeps the workflow from running on issue-comments outside of
  # PRs and on comments that don't address Claude.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel in-flight reviews when new COMMITS are pushed (so we don't
# review a stale revision) ‚Äî but NOT when comment events fire.
#
# Comment-triggered runs (`issue_comment`, `pull_request_review_comment`)
# share the same concurrency group as `pull_request` runs. Without the
# event-aware `cancel-in-progress`, every comment on a PR ‚Äî even bot
# threads or laconic replies the `if:` guard would skip ‚Äî would cancel
# an in-flight pull_request review on the same ref.
#
# With this expression, only `pull_request` events (= new pushes) cancel
# in-flight runs. Comment events queue behind / run alongside, and any
# without `@claude` get filtered out by the job-level `if:` guard anyway.
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  claude-review:
    name: Claude Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Shallow clone ‚Äî review only needs the diff, not full history.
          fetch-depth: 1

      # `issue_comment` and `pull_request_review_comment` events run
      # against the default branch (main), not the PR's HEAD ‚Äî that's how
      # GitHub dispatches comment-triggered workflows. Without this step,
      # Claude is staring at `main` and has to discover the PR's contents
      # via repeated `gh pr diff` / `gh api` calls, burning max-turns
      # before it can post anything. Switch to the PR branch so Claude
      # sees the actual diff in the working tree.
      - name: Checkout PR branch when triggered by comment
        if: |
          github.event_name == 'issue_comment' ||
          github.event_name == 'pull_request_review_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh pr checkout "$PR_NUMBER"

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          # Pass both auth modes ‚Äî the action picks whichever secret is set.
          # ANTHROPIC_API_KEY is raw API billing; CLAUDE_CODE_OAUTH_TOKEN is
          # what `/install-github-app` populates and uses App billing.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number || github.event.issue.number }}. This is the bugspotter-intelligence FastAPI service (async Python, psycopg/pgvector, multi-tenant). Focus on real-impact issues:
            - Auth/security: bypass, injection, missing tenant scoping (tenant_id), credential/secret leak in responses or logs, SSRF
            - Concurrency: races, deadlocks, transactional gaps, connection-pool misuse
            - Data correctness: embedding-dimension mismatches, SQL that detoasts/full-scans large tables, NULL handling
            - Missing tests for new behavior
            - Concrete bugs at file:line ‚Äî name the failure mode

            Skip nits, style, theoretical issues.

            ${{ github.event_name == 'pull_request' && 'Output rules: inline comments only ‚Äî no top-level summary. If nothing substantive, exit silently (this is an automatic per-push review; silence is the right default).' || 'Output rules: this review was triggered explicitly by a human via @claude ‚Äî they need to know the action ran and what you concluded. Post inline comments for any real-impact issues you find, then ALWAYS post exactly ONE short top-level comment via `gh pr comment` summarising the outcome (e.g. "Reviewed N files; no real-impact issues found." or "Posted N inline comments ‚Äî see threads above."). Never exit silently on a human-triggered review.' }}

            Process: read the full diff in one `gh pr diff` call. Use `Grep`
            across the working tree only when a comment would otherwise be
            inaccurate without the surrounding context. Don't enumerate every
            file; pick the riskiest spots. Post inline comments on at most
            5 issues, then stop.
          # `mcp__github_inline_comment__create_inline_comment` is the
          # MCP-bridged tool the action uses to buffer inline review
          # comments. Without it explicitly allow-listed, Claude's tool
          # calls get denied and the action exits with "No buffered inline
          # comments" ‚Äî silently producing nothing visible.
          #
          # `gh pr diff` / `gh pr view` are read-only fallbacks for
          # exploratory navigation. `Read`, `Grep`, `Glob` are the built-in
          # file-navigation tools ‚Äî also read-only, cheaper in turns.
          #
          # `gh pr comment` is conditionally allow-listed ONLY for
          # comment-triggered (`@claude`) runs. Per-push auto-runs remain
          # inline-only ‚Äî silent-exit is the right default for routine
          # pushes; human-triggered runs need a visible acknowledgement.
          #
          # We deliberately do NOT allow `gh api:*` (its `-X POST/PATCH/DELETE`
          # would let Claude mutate any resource the GITHUB_TOKEN can touch).
          #
          # Note on the `${{ cond && A || '' }}` expression: GitHub Actions
          # treats empty strings as falsy, so the ternary trick only works
          # when `A` is truthy. Keep this form: condition true ‚Üí non-empty
          # branch appended; condition false ‚Üí `''` fallback.
          #
          # Model: Haiku for auto-runs (cheap per-PR sanity check), Opus for
          # human-triggered `@claude` pings (deeper read on demand). Both
          # branches are non-empty model ids, so the `&& A || B` ternary is
          # safe here (unlike the allowedTools line).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob${{ github.event_name != 'pull_request' && ',Bash(gh pr comment:*)' || '' }}"
            --max-turns 25
            --model ${{ github.event_name == 'pull_request' && 'claude-haiku-4-5-20251001' || 'claude-opus-4-7' }}
