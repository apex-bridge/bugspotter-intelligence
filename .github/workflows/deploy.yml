name: Deploy Intelligence Service

# Builds the Docker image, pushes to Yandex Container Registry,
# and deploys to the production VM via SSH.
#
# Required GitHub Secrets (set in repo Settings > Secrets):
#   YC_SA_KEY          — Yandex Cloud service account JSON key
#   YC_REGISTRY_ID     — Yandex Container Registry ID
#   SSH_DEPLOY_KEY     — SSH private key for VM access
#   SSH_KNOWN_HOSTS    — SSH known hosts entry for the VM
#   DEPLOY_HOST        — VM hostname/IP
#   DEPLOY_USER        — SSH user on the VM

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'docker/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-intelligence-${{ github.ref }}
  cancel-in-progress: true

env:
  YC_REGISTRY: cr.yandexcloud.kz
  IMAGE_NAME: bugspotter-intelligence

jobs:
  # ================================================================
  # Step 1: Run tests
  # ================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bugspotter_intelligence
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration" --cov=src/bugspotter_intelligence

  # ================================================================
  # Step 2: Build and push Docker image
  # ================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    if: needs.test.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Yandex Container Registry
        run: |
          echo '${{ secrets.YC_SA_KEY }}' | docker login \
            --username json_key \
            --password-stdin \
            ${{ env.YC_REGISTRY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.YC_REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.YC_REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=intelligence
          cache-to: type=gha,mode=max,scope=intelligence

  # ================================================================
  # Step 3: Deploy to VM
  # ================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: needs.build-and-push.result == 'success'

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          fi

      - name: Deploy intelligence service
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_SCRIPT'

          set -e
          echo "=== Deploying Intelligence Service ==="
          cd /opt/bugspotter

          # Authenticate with registry
          echo '${{ secrets.YC_SA_KEY }}' | docker login \
            --username json_key \
            --password-stdin \
            cr.yandexcloud.kz

          # Pull the new intelligence image
          echo "Pulling latest intelligence image..."
          docker compose --profile intelligence pull intelligence 2>/dev/null || {
            echo "⚠️ Intelligence profile not configured or image not found"
            echo "Ensure docker-compose.yml has the intelligence profile"
            exit 1
          }

          # Restart only the intelligence service (not the whole stack)
          echo "Restarting intelligence service..."
          docker compose --profile intelligence up -d --no-build intelligence

          # Wait for health check
          echo "Waiting for intelligence health check..."
          for i in $(seq 1 20); do
            if docker compose exec -T api curl -sf http://intelligence:8000/health > /dev/null 2>&1; then
              echo "✅ Intelligence service is healthy"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "❌ Intelligence health check timed out"
              docker compose logs --tail=30 intelligence
              exit 1
            fi
            echo "  Waiting... ($i/20)"
            sleep 5
          done

          echo ""
          echo "=== Intelligence deployment complete ==="
          docker compose --profile intelligence ps intelligence
          DEPLOY_SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
