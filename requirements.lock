# Fully-pinned production dependency lock for bugspotter-intelligence.
#
# Generated from the verified-working prod container (pip freeze), so the
# image builds reproducibly instead of re-resolving pyproject's >= ranges
# on every build. This is what prevented the FastAPI 0.137 break (#43)
# from being caught: an unpinned bump shipped silently.
#
# Regenerate after intentionally changing deps in pyproject.toml:
#   docker exec <intelligence-container> /opt/venv/bin/pip freeze \
#     | grep -v '^bugspotter-intelligence' > requirements.lock
# (or run pip-compile / 'uv pip compile pyproject.toml' on a linux/py3.12 target)
#
# pyproject.toml remains the source of truth for direct deps + version caps;
# this file pins the full transitive closure to exact versions.
